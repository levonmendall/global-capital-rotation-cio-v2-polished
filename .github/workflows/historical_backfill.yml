name: Historical Intelligence Backfill

on:
  workflow_dispatch:
    inputs:
      period:
        description: "Yahoo Finance history period"
        required: true
        default: "10y"
        type: choice
        options:
          - "3y"
          - "5y"
          - "10y"
          - "max"

      frequency:
        description: "Archive frequency"
        required: true
        default: "W-FRI"
        type: choice
        options:
          - "B"
          - "W-FRI"
          - "ME"

permissions:
  contents: write

concurrency:
  group: historical-intelligence-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Confirm required files
        run: |
          pwd
          ls -la
          test -f backfill_history.py
          test -f historical_engine.py
          test -f current_snapshot.csv

      - name: Build historical database
        run: |
          python backfill_history.py \
            --period "${{ inputs.period }}" \
            --frequency "${{ inputs.frequency }}"

      - name: Commit historical intelligence
        run: |
          git config user.name "capital-rotation-bot"
          git config user.email "capital-rotation-bot@users.noreply.github.com"

          git add data/history/*.csv capital_rotation_v21.db

          if git diff --cached --quiet; then
            echo "No historical changes to commit."
          else
            git commit -m "Build V2.1 historical intelligence"
            git push
          fi
