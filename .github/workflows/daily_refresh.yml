name: Daily Polished V2 Market Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "35 1 * * 2-6"

permissions:
  contents: write

concurrency:
  group: polished-v2-daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh market data
        run: python refresh_all.py

      - name: Commit refreshed snapshot
        run: |
          git config user.name "capital-rotation-bot"
          git config user.email "capital-rotation-bot@users.noreply.github.com"

          git add current_snapshot.csv

          if git diff --cached --quiet; then
            echo "No market-data changes to commit."
          else
            git commit -m "Automated polished V2 market refresh"
            git push
          fi
