name: Daily V2 Market Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "35 1 * * 2-6"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Confirm required files
        run: |
          pwd
          ls -la
          test -f refresh_all.py
          test -f current_snapshot.csv

      - name: Refresh market data
        run: python refresh_all.py

      - name: Commit refreshed snapshot
        run: |
          git config user.name "capital-rotation-bot"
          git config user.email "capital-rotation-bot@users.noreply.github.com"

          git add current_snapshot.csv

          if git diff --cached --quiet; then
            echo "No market-data changes to commit."
          else
            git commit -m "Automated V2 market refresh"
            git push
          fi
